name: yaccount
description: 本地加密记账应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 数据库
  sqflite: ^2.3.0
  sqflite_sqlcipher: ^3.0.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # 状态管理
  provider: ^6.1.1
  
  # 图表
  fl_chart: ^0.66.0
  
  # CSV处理
  csv: ^5.1.1
  
  # 日期时间
  intl: ^0.18.1
  
  # 权限
  permission_handler: ^11.1.0
  
  # 文件选择
  file_picker: ^6.1.1
  
  # 加密
  crypto: ^3.0.3
  
  # UI组件
  flutter_screenutil: ^5.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  fonts:
    - family: CustomIcons
      fonts:
        - asset: assets/fonts/CustomIcons.ttf
